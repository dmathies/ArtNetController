<!DOCTYPE html>
<html>
  <head>
    <title>Wifi Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
    <style>
      html, body { height: 100%; }
      html { background-color: #0f2027; }
      body {
        color: #fff; background: linear-gradient(#2c5364, #203a43, #0f2027);
        margin: 0; font-family: Verdana, sans-serif; font-weight: 300;
      }
      body, #manager { display: flex; flex-direction: column; justify-content: center; align-items: center; }
      button {
        text-shadow: 0 1px #134a4666; text-transform: uppercase; color: #fff; cursor: pointer;
        background-color: #7ab893; border: none; border-radius: 3px; margin-top: 12px; padding: 8px 14px;
        font-family: Verdana, sans-serif; font-size: 11px; font-weight: 700;
      }
      h1 { margin: 0 0 20px; font-size: 22px; }
      h2 { margin: 12px 0 6px; font-size: 16px; }
      span { margin-bottom: 6px; display: flex; }
      input, select, label { box-sizing: border-box; height: 34px; }
      input, select {
        width: 160px; text-indent: 8px; color: #377d6a; background: #efefef; border: 0; border-radius: 0 3px 3px 0;
        outline: 0; font-family: Verdana, sans-serif; font-size: 11px; font-weight: 400;
      }
      input::-webkit-input-placeholder { color: #aaa; }
      label {
        width: 100px; text-transform: uppercase; color: #2a3b31; text-shadow: 0 1px #fff6; background: #7ab893;
        border-radius: 3px 0 0 3px; padding: 10px 14px; font-size: 11px; font-weight: 700; display: inline-block;
      }
      #custom-ssid { display: none; }
      #confirmation {
        width: 275px; color: #2a3b31; background: #7ab893; border-radius: 3px; padding: 24px; font-size: 12px;
        display: none; position: absolute; box-shadow: 0 3px 8px #0000003d;
      }
      #confirmation p:last-child { margin-bottom: 0; }
      #loader {
        width: 50px; height: 50px; border: 8px solid #efefef; border-right-color: #7ab893; border-radius: 50%;
        animation: 2s linear infinite spinner; display: none;
      }
      @keyframes spinner { to { transform: rotate(1turn); } }
      .section { margin-top: 8px; width: 260px; display: flex; flex-direction: column; align-items: center; }

      /* LED status bar */
      #live {
        display:flex; gap:12px; margin:10px 0 18px;
        background:#ffffff22; padding:8px 12px; border-radius:6px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .led-row {
        display:flex;
        align-items:center;
        gap:6px;
        min-width: 140px;
      }
      .led-label { font-weight: 600; }
      .led-square {
        width:14px;
        height:14px;
        border:1px solid #fff3;
        border-radius:2px;
        background:#000;
      }
      .led-value {
        min-width: 60px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
    </style>
    <script>
      let statusSocket = null;
      let wsConnected = false;
      let wsReconnectTimer = null;
      let statusPollInFlight = false;
      let statusPollTimer = null;
      const STATUS_POLL_ACTIVE_MS = 3000;
      const STATUS_POLL_HIDDEN_MS = 5000;
      const STATUS_FETCH_TIMEOUT_MS = 3000;
      const apiBase = `${window.location.protocol}//${window.location.host}`;

      function applyStatus(s) {
        // LED values
        for (let i = 0; i < 4; i++) {
          const raw = s["led_value" + i];
          const valueEl = document.getElementById("led-val-" + i);
          const squareEl = document.getElementById("led-sq-" + i);

          if (typeof raw !== "undefined") {
            const num = Number(raw);
            if (valueEl) valueEl.innerText = isFinite(num) ? num.toFixed(3) : String(raw);

            const c = Math.round(num * 255);
            if (squareEl) squareEl.style.backgroundColor = `rgb(${c},${c},${c})`;
          }
        }

        document.getElementById("artAge").innerText = s.art_age_ms ?? "-";
      }

      function scheduleNextStatusPoll(delayMs) {
        if (statusPollTimer) {
          clearTimeout(statusPollTimer);
        }
        statusPollTimer = setTimeout(pollStatus, delayMs);
      }

      function connectStatusWebSocket() {
        if (statusSocket && (statusSocket.readyState === WebSocket.OPEN || statusSocket.readyState === WebSocket.CONNECTING)) {
          return;
        }

        const proto = window.location.protocol === "https:" ? "wss" : "ws";
        statusSocket = new WebSocket(`${proto}://${window.location.host}/ws`);

        statusSocket.onopen = () => {
          wsConnected = true;
          if (wsReconnectTimer) {
            clearTimeout(wsReconnectTimer);
            wsReconnectTimer = null;
          }
          try { statusSocket.send("status"); } catch (e) {}
        };

        statusSocket.onmessage = (ev) => {
          try {
            const s = JSON.parse(ev.data);
            applyStatus(s);
          } catch (e) {
            // ignore malformed messages
          }
        };

        statusSocket.onclose = () => {
          wsConnected = false;
          if (!wsReconnectTimer) {
            wsReconnectTimer = setTimeout(() => {
              wsReconnectTimer = null;
              connectStatusWebSocket();
            }, 1500);
          }
          scheduleNextStatusPoll(500);
        };

        statusSocket.onerror = () => {
          if (statusSocket) statusSocket.close();
        };
      }

      async function pollStatus() {
        if (wsConnected) {
          const nextDelay = document.hidden ? STATUS_POLL_HIDDEN_MS : STATUS_POLL_ACTIVE_MS;
          scheduleNextStatusPoll(nextDelay);
          return;
        }

        if (statusPollInFlight) {
          scheduleNextStatusPoll(STATUS_POLL_ACTIVE_MS);
          return;
        }

        statusPollInFlight = true;
        try {
          const ctrl = new AbortController();
          const timeoutId = setTimeout(() => ctrl.abort(), STATUS_FETCH_TIMEOUT_MS);
          const res = await fetch(`${apiBase}/status`, { cache: "no-store", signal: ctrl.signal });
          clearTimeout(timeoutId);
          if (!res.ok) throw new Error();
          const s = await res.json();
          applyStatus(s);
        } catch (e) {
          // ignore poll errors
        } finally {
          statusPollInFlight = false;
          const nextDelay = document.hidden ? STATUS_POLL_HIDDEN_MS : STATUS_POLL_ACTIVE_MS;
          scheduleNextStatusPoll(nextDelay);
        }
      }
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          scheduleNextStatusPoll(STATUS_POLL_HIDDEN_MS);
        } else {
          connectStatusWebSocket();
          scheduleNextStatusPoll(250);
        }
      });
      document.addEventListener("DOMContentLoaded", () => {
        connectStatusWebSocket();
        pollStatus();
      });

      let initialCreds = null;
      let networkHandlerAttached = false;
      let networkScanInProgress = false;

      function optionExists(sel, value) {
        for (const o of sel.options) if (o.value === value) return true;
        return false;
      }

      async function loadCredentials() {
        try {
          const res = await fetch(`${apiBase}/credentials`, { method: "GET", cache: "no-store" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const json = await res.json();

          initialCreds = {
            ssid: json.ssid || "",
            password: json.password || "",
            hostname: json.hostname || "",
            dmx_address: (json.dmx_address ?? 1),
            dmx_universe: (json.dmx_universe ?? 0)
          };

          document.getElementById("ssid").value = initialCreds.ssid || "";
          document.getElementById("password").value = initialCreds.password || "";
          document.getElementById("hostname").value = initialCreds.hostname || "";
          document.getElementById("dmx-address").value = initialCreds.dmx_address;
          document.getElementById("dmx-universe").value = initialCreds.dmx_universe;

          const sel = document.getElementById("network");
          if (!sel.disabled && initialCreds.ssid && optionExists(sel, initialCreds.ssid)) {
            sel.value = initialCreds.ssid;
            toggleCustomSsid(sel.value);
          } else {
            toggleCustomSsid(sel.value || "");
          }
        } catch (e) {
          toggleCustomSsid("");
        }
      }

      function renderNetworks(list) {
        const sel = document.getElementById("network");
        const refreshBtn = document.getElementById("refresh-networks");
        sel.disabled = false;
        sel.innerHTML = "";

        if (Array.isArray(list) && list.length) {
          for (const ssid of list) {
            const opt = document.createElement("option");
            opt.value = ssid;
            opt.text = ssid;
            sel.appendChild(opt);
          }
        }

        const other = document.createElement("option");
        other.value = "";
        other.text = "Other network";
        sel.appendChild(other);

        if (initialCreds && initialCreds.ssid && optionExists(sel, initialCreds.ssid)) {
          sel.value = initialCreds.ssid;
        }

        toggleCustomSsid(sel.value);
        if (refreshBtn) {
          refreshBtn.disabled = false;
          refreshBtn.textContent = "Refresh Networks";
        }
        networkScanInProgress = false;

        if (!networkHandlerAttached) {
          sel.addEventListener("change", () => toggleCustomSsid(sel.value));
          networkHandlerAttached = true;
        }
      }

      function initNetworkSelector() {
        const sel = document.getElementById("network");
        if (!sel) return;
        sel.disabled = false;
        sel.innerHTML = "";

        const other = document.createElement("option");
        other.value = "";
        other.text = "Other network";
        sel.appendChild(other);
        sel.value = "";

        if (!networkHandlerAttached) {
          sel.addEventListener("change", () => toggleCustomSsid(sel.value));
          networkHandlerAttached = true;
        }
      }

      async function fetchNetworks() {
        const sel = document.getElementById("network");
        const refreshBtn = document.getElementById("refresh-networks");
        try {
          const res = await fetch(`${apiBase}/networks?details=1`, { method: "GET", cache: "no-store" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const body = await res.json();
          const list = Array.isArray(body.networks) ? body.networks : [];

          if (body.scanning) {
            sel.disabled = true;
            networkScanInProgress = true;
            if (refreshBtn) {
              refreshBtn.disabled = true;
              refreshBtn.textContent = "Scanning...";
            }
            setTimeout(fetchNetworks, 600);
            return;
          }

          renderNetworks(list);
        } catch (e) {
          networkScanInProgress = false;
          sel.disabled = false;
          if (refreshBtn) {
            refreshBtn.disabled = false;
            refreshBtn.textContent = "Refresh Networks";
          }
          showManualSsid();
        }
      }

      function refreshNetworks() {
        if (networkScanInProgress) return;
        networkScanInProgress = true;
        const refreshBtn = document.getElementById("refresh-networks");
        if (refreshBtn) {
          refreshBtn.disabled = true;
          refreshBtn.textContent = "Scanning...";
        }
        fetchNetworks();
      }

      function showManualSsid() {
        document.getElementById("custom-ssid").style.display = "flex";
      }

      function toggleCustomSsid(selected) {
        const custom = document.getElementById("custom-ssid");
        const ssidInput = document.getElementById("ssid");
        const show = selected.length ? "none" : "flex";
        const value = selected.length ? selected : (initialCreds?.ssid || "");
        custom.style.display = show;
        ssidInput.value = value;
      }

      async function saveAndReboot() {
        const manager = document.getElementById("manager");
        const loader = document.getElementById("loader");
        manager.style.display = "none";
        loader.style.display = "inline";

        try {
          const payload = {
            ssid: document.getElementById("ssid").value,
            password: document.getElementById("password").value,
            hostname: document.getElementById("hostname").value,
            dmx_address: Number(document.getElementById("dmx-address").value || "1"),
            dmx_universe: Number(document.getElementById("dmx-universe").value || "0")
          };

          const res = await fetch(`${apiBase}/credentials`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          loader.style.display = "none";
          if (res.status === 204) {
            document.getElementById("confirmation").style.display = "inline";
          } else {
            restoreWithError();
          }
        } catch {
          restoreWithError();
        }
      }

      function restoreWithError() {
        document.getElementById("manager").style.display = "flex";
        document.getElementById("loader").style.display = "none";
        setTimeout(() => alert("Error saving configuration"), 0);
      }

      document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("save").addEventListener("click", saveAndReboot);
        document.getElementById("refresh-networks").addEventListener("click", refreshNetworks);
        initNetworkSelector();
        loadCredentials();
      });
    </script>
  </head>

  <body>
    <div id="live">
      <div class="led-row">
        <span class="led-label">LED 0:</span>
        <span id="led-sq-0" class="led-square"></span>
        <span id="led-val-0" class="led-value">0.000</span>
      </div>
      <div class="led-row">
        <span class="led-label">LED 1:</span>
        <span id="led-sq-1" class="led-square"></span>
        <span id="led-val-1" class="led-value">0.000</span>
      </div>
      <div class="led-row">
        <span class="led-label">LED 2:</span>
        <span id="led-sq-2" class="led-square"></span>
        <span id="led-val-2" class="led-value">0.000</span>
      </div>
      <div class="led-row">
        <span class="led-label">LED 3:</span>
        <span id="led-sq-3" class="led-square"></span>
        <span id="led-val-3" class="led-value">0.000</span>
      </div>
      <div class="led-row">
        <span class="led-label">Art-Net:</span>
        <span id="artAge" class="led-value">-</span><span style="font-size:11px;margin-left:-4px;">ms</span>
      </div>
    </div>

    <div id="manager">
      <h1>Wifi Manager</h1>

      <div class="section">
        <h2>Wi-Fi</h2>
        <span>
          <label for="network">Network</label>
          <select id="network">
            <option>Other network</option>
          </select>
        </span>

        <span>
          <button id="refresh-networks" type="button">Refresh Networks</button>
        </span>
        <span id="custom-ssid">
          <label for="ssid">WLAN SSID</label>
          <input id="ssid" type="text" placeholder="Name of the network" />
        </span>

        <span>
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Only if required" />
        </span>

        <span>
          <label for="hostname">Hostname</label>
          <input id="hostname" type="text" placeholder="eg. 'my-esp32'" />
        </span>
      </div>

      <div class="section">
        <h2>DMX</h2>
        <span>
          <label for="dmx-address">Address</label>
          <input id="dmx-address" type="number" min="1" max="512" step="1" inputmode="numeric" placeholder="1 - 512" />
        </span>
        <span>
          <label for="dmx-universe">Universe</label>
          <input id="dmx-universe" type="number" min="0" max="32767" step="1" inputmode="numeric" placeholder="0" />
        </span>
      </div>

      <button id="save">Save and restart</button>
    </div>

    <div id="loader"></div>

    <div id="confirmation">
      <h2>Credentials saved!</h2>
      <p>The controller is now being restarted and will try to connect to the WiFi with the new configuration.</p>
    </div>
  </body>
</html>
