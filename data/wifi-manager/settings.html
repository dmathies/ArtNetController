<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Settings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
<style>

      :root {
        --bg0: #120d09;
        --bg1: #1f1710;
        --bg2: #2e2217;
        --bg3: #0d0d0f;
        --panel: rgba(28, 22, 17, 0.92);
        --panel-2: rgba(39, 30, 22, 0.97);
        --soft: rgba(255,255,255,0.045);
        --soft-2: rgba(255,255,255,0.08);
        --logo-color: var(--accent-3);
        --line-strong: rgba(214,173,98,0.42);
        --text: #f5ecde;
        --muted: #c6b49d;
        --accent: #d6ad62;
        --accent-2: #946325;
        --accent-3: #f2cf87;
        --accent-rgb: 214,173,98;
        --ok: #c5a96b;
        --ok-rgb: 197,169,107;
        --warn: #f0c670;
        --danger: #ef9a7d;
        --shadow: 0 18px 48px rgba(0,0,0,0.34);
        --radius: 18px;
        --radius-sm: 14px;
        --input-bg: rgba(255,255,255,0.06);
        --input-bg-focus: rgba(255,255,255,0.10);
        --button-text: #24160b;
        --button-bg: linear-gradient(135deg, var(--accent-3), var(--accent-2));
        --button-bg-hover: linear-gradient(135deg, #f7ddab, #b37734);
        --meter-bg: rgba(255,255,255,0.05);
        --meter-fill: linear-gradient(90deg, rgba(var(--accent-rgb),0.30), rgba(var(--accent-rgb),0.96));
        --header-line: linear-gradient(90deg, rgba(var(--accent-rgb),0.55), rgba(var(--accent-rgb),0.18), transparent);
        --select-option-bg: var(--bg1);
        --select-option-text: var(--text);
        --select-option-active-bg: var(--accent-2);
        --select-option-active-text: var(--text);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      html {
        background:
          radial-gradient(circle at top left, rgba(var(--accent-rgb), 0.14), transparent 28%),
          radial-gradient(circle at top right, rgba(var(--accent-rgb), 0.10), transparent 22%),
          linear-gradient(180deg, var(--bg2), var(--bg0) 44%, var(--bg3));
      }
      body {
        margin: 0;
        color: var(--text);
        font-family: "Segoe UI", Verdana, sans-serif;
        background: transparent;
      }
      a { color: inherit; text-decoration: none; }
      button, input, select { font: inherit; }
      .page { min-height: 100%; padding: 18px; }
      .shell { max-width: 1120px; margin: 0 auto; }
      .topbar, .card {
        background: linear-gradient(180deg, var(--panel-2), var(--panel));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }
      .topbar::before, .card::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 1px;
        background: var(--header-line);
      }
      .topbar {
        padding: 16px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }
      .brand-logo {
        width: 56px;
        height: 56px;
        flex: 0 0 auto;
        border-radius: 16px;
        padding: 8px;
        color: var(--logo-color);
        background:
          radial-gradient(circle at 28% 22%, rgba(255,255,255,0.08), transparent 46%),
          linear-gradient(180deg, rgba(var(--accent-rgb),0.10), rgba(255,255,255,0.02));
        border: 1px solid var(--line);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.05),
          0 0 22px rgba(var(--accent-rgb),0.08);
      }
      .brand-logo svg {
        width: 100%;
        height: 100%;
        display: block;
      }
      .eyebrow {
        margin: 0 0 3px;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent-3);
        font-weight: 800;
      }
      h1 {
        margin: 0;
        font-size: clamp(24px, 4vw, 34px);
        line-height: 1.08;
      }
      .subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 13px;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: flex-end;
      }
      .btn, .chip, .theme-select {
        border-radius: 999px;
        min-height: 42px;
      }
      .btn, .chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 16px;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--line-strong);
        color: var(--text);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        transition: transform .15s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
      }
      .btn:hover, .chip:hover {
        transform: translateY(-1px);
        background: rgba(255,255,255,0.08);
        border-color: rgba(var(--accent-rgb),0.56);
      }
      .btn-primary {
        border: none;
        background: var(--button-bg);
        color: var(--button-text);
        box-shadow: 0 10px 22px rgba(var(--accent-rgb),0.22);
      }
      .btn-primary:hover { background: var(--button-bg-hover); }
      .theme-wrap {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 8px 0 14px;
        border-radius: 999px;
        border: 1px solid var(--line-strong);
        background: rgba(255,255,255,0.05);
        min-height: 42px;
      }
      .theme-label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-weight: 800;
      }
      .theme-select {
        border: none;
        background: transparent;
        color: var(--text);
        padding: 0 8px 0 0;
        outline: none;
      }
      .theme-select option { color: #111; }
      .card-inner { padding: 20px; }
      .card-title { margin: 0; font-size: 18px; font-weight: 800; }
      .muted { color: var(--muted); }
      .mono { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 11px;
        border-radius: 999px;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--line);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 800;
        color: var(--muted);
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 12px rgba(var(--accent-rgb),0.55);
      }
      code {
        font-family: Consolas, "Courier New", monospace;
        font-size: 0.95em;
        color: var(--accent-3);
      }
      @media (max-width: 760px) {
        .page { padding: 12px; }
        .topbar { flex-direction: column; align-items: flex-start; }
        .toolbar { width: 100%; justify-content: stretch; }
      }

      .panel { max-width: 900px; margin: 0 auto; }
      .panel .card-inner { padding: 22px; }
      .section {
        display: grid;
        gap: 14px;
      }
      .section + .section {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
      }
      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .section-title {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
      }
      .field-grid { display: grid; gap: 12px; }
      .field {
        display: grid;
        grid-template-columns: 128px minmax(0, 1fr);
      }
      .field label {
        display: flex;
        align-items: center;
        padding: 0 14px;
        min-height: 50px;
        background: rgba(var(--accent-rgb),0.12);
        border: 1px solid rgba(var(--accent-rgb),0.28);
        border-right: none;
        border-radius: 14px 0 0 14px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 11px;
        font-weight: 800;
        color: var(--accent-3);
      }
      .field input, .field select {
        width: 100%;
        min-height: 50px;
        padding: 0 14px;
        border-radius: 0 14px 14px 0;
        border: 1px solid var(--line);
        background: var(--input-bg);
        color: var(--text);
        outline: none;
        color-scheme: dark;
      }
      .field input:focus, .field select:focus {
        background: var(--input-bg-focus);
        border-color: var(--line-strong);
      }
      .field select option {
        background: var(--select-option-bg);
        color: var(--select-option-text);
      }
      .field select option:hover,
      .field select option:focus,
      .field select option:checked,
      .field select option:active {
        background: var(--select-option-active-bg);
        color: var(--select-option-active-text);
      }
      .field input::placeholder { color: var(--muted); }
      .inline-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .notice {
        display: none;
        margin-top: 18px;
        padding: 16px 18px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(var(--accent-rgb),0.10);
        color: var(--text);
      }
      #loader-wrap {
        display: none;
        margin-top: 18px;
        align-items: center;
        gap: 14px;
        padding: 16px 18px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: var(--soft);
      }
      #loader {
        width: 30px;
        height: 30px;
        border: 3px solid rgba(255,255,255,0.16);
        border-right-color: var(--accent);
        border-radius: 50%;
        animation: spinner .9s linear infinite;
        display: inline-block;
      }
      @keyframes spinner { to { transform: rotate(1turn); } }
      @media (max-width: 640px) {
        .field { grid-template-columns: 1fr; }
        .field label {
          border-right: 1px solid rgba(var(--accent-rgb),0.28);
          border-radius: 14px 14px 0 0;
          min-height: 42px;
        }
        .field input, .field select { border-radius: 0 0 14px 14px; }
      }

</style>
<script>

      const THEMES = {
        gold: {
          '--bg0':'#120d09','--bg1':'#1f1710','--bg2':'#2e2217','--bg3':'#0d0d0f',
          '--panel':'rgba(28,22,17,0.92)','--panel-2':'rgba(39,30,22,0.97)',
          '--soft':'rgba(255,255,255,0.045)','--soft-2':'rgba(255,255,255,0.08)',
          '--line':'rgba(214,173,98,0.22)','--line-strong':'rgba(214,173,98,0.42)',
          '--text':'#f5ecde','--muted':'#c6b49d','--accent':'#d6ad62','--accent-2':'#946325','--accent-3':'#f2cf87',
          '--accent-rgb':'214,173,98','--ok':'#c5a96b','--ok-rgb':'197,169,107','--warn':'#f0c670','--danger':'#ef9a7d',
          '--input-bg':'rgba(255,255,255,0.06)','--input-bg-focus':'rgba(255,255,255,0.10)',
          '--button-text':'#24160b',
          '--button-bg':'linear-gradient(135deg, var(--accent-3), var(--accent-2))',
          '--button-bg-hover':'linear-gradient(135deg, #f7ddab, #b37734)',
          '--meter-bg':'rgba(255,255,255,0.05)',
          '--meter-fill':'linear-gradient(90deg, rgba(var(--accent-rgb),0.30), rgba(var(--accent-rgb),0.96))',
          '--header-line':'linear-gradient(90deg, rgba(var(--accent-rgb),0.55), rgba(var(--accent-rgb),0.18), transparent)',
          '--select-option-bg':'#1f1710','--select-option-text':'#f5ecde','--select-option-active-bg':'#946325','--select-option-active-text':'#f5ecde'
        },
        blue: {
          '--bg0':'#0b1018','--bg1':'#111a27','--bg2':'#18273a','--bg3':'#090d14',
          '--panel':'rgba(14,22,34,0.92)','--panel-2':'rgba(19,30,45,0.97)',
          '--soft':'rgba(255,255,255,0.045)','--soft-2':'rgba(255,255,255,0.08)',
          '--line':'rgba(92,166,255,0.20)','--line-strong':'rgba(92,166,255,0.42)',
          '--text':'#eef6ff','--muted':'#aac0dd','--accent':'#67b5ff','--accent-2':'#2f5e9d','--accent-3':'#b8e3ff',
          '--accent-rgb':'103,181,255','--ok':'#6fb9ff','--ok-rgb':'111,185,255','--warn':'#f0c670','--danger':'#ef9a7d',
          '--input-bg':'rgba(255,255,255,0.06)','--input-bg-focus':'rgba(255,255,255,0.10)',
          '--button-text':'#0b1727',
          '--button-bg':'linear-gradient(135deg, var(--accent-3), var(--accent-2))',
          '--button-bg-hover':'linear-gradient(135deg, #d4efff, #4877b3)',
          '--meter-bg':'rgba(255,255,255,0.05)',
          '--meter-fill':'linear-gradient(90deg, rgba(var(--accent-rgb),0.26), rgba(var(--accent-rgb),0.94))',
          '--header-line':'linear-gradient(90deg, rgba(var(--accent-rgb),0.62), rgba(var(--accent-rgb),0.18), transparent)',
          '--select-option-bg':'#111a27','--select-option-text':'#eef6ff','--select-option-active-bg':'#294c78','--select-option-active-text':'#eef6ff'
        },
        green: {
          '--bg0':'#0d1511','--bg1':'#15241d','--bg2':'#1d3329','--bg3':'#09100d',
          '--panel':'rgba(15,25,21,0.92)','--panel-2':'rgba(20,35,28,0.97)',
          '--soft':'rgba(255,255,255,0.045)','--soft-2':'rgba(255,255,255,0.08)',
          '--line':'rgba(111,196,145,0.22)','--line-strong':'rgba(111,196,145,0.42)',
          '--text':'#edf8f0','--muted':'#b3ceb9','--accent':'#78cb97','--accent-2':'#2d7250','--accent-3':'#bce9ca',
          '--accent-rgb':'120,203,151','--ok':'#78cb97','--ok-rgb':'120,203,151','--warn':'#f0c670','--danger':'#ef9a7d',
          '--input-bg':'rgba(255,255,255,0.06)','--input-bg-focus':'rgba(255,255,255,0.10)',
          '--button-text':'#0d1c14',
          '--button-bg':'linear-gradient(135deg, var(--accent-3), var(--accent-2))',
          '--button-bg-hover':'linear-gradient(135deg, #d5f5df, #428565)',
          '--meter-bg':'rgba(255,255,255,0.05)',
          '--meter-fill':'linear-gradient(90deg, rgba(var(--accent-rgb),0.28), rgba(var(--accent-rgb),0.96))',
          '--header-line':'linear-gradient(90deg, rgba(var(--accent-rgb),0.62), rgba(var(--accent-rgb),0.18), transparent)',
          '--select-option-bg':'#15241d','--select-option-text':'#edf8f0','--select-option-active-bg':'#2d7250','--select-option-active-text':'#edf8f0'
        }
      };

      function applyTheme(themeName) {
        const theme = THEMES[themeName] || THEMES.gold;
        const root = document.documentElement;
        Object.keys(theme).forEach(k => root.style.setProperty(k, theme[k]));
        root.style.setProperty('--logo-color', 'var(--accent-3)');
        document.querySelectorAll('.theme-select').forEach(sel => sel.value = themeName);
        try { localStorage.setItem('gaos-theme', themeName); } catch (e) {}
      }

      function initThemePicker() {
        const saved = (() => { try { return localStorage.getItem('gaos-theme'); } catch(e) { return null; } })() || 'gold';
        applyTheme(saved);
        document.querySelectorAll('.theme-select').forEach(sel => {
          sel.addEventListener('change', () => applyTheme(sel.value));
        });
      }

      document.addEventListener('DOMContentLoaded', initThemePicker);


      const apiBase = `${window.location.protocol}//${window.location.host}`;
      let initialCreds = null;
      let networkHandlerAttached = false;
      let networkScanInProgress = false;
      let credentialsLoaded = false;

      function setSaveEnabled(enabled) {
        const saveBtn = document.getElementById("save");
        if (saveBtn) saveBtn.disabled = !enabled;
      }

      function optionExists(sel, value) {
        for (const o of sel.options) if (o.value === value) return true;
        return false;
      }

      function getSelectedNetworkValue() {
        const sel = document.getElementById("network");
        if (!sel) return "";
        const value = (sel.value || "").trim();
        if (!value) return "";
        return optionExists(sel, value) ? value : "";
      }

      async function loadCredentials() {
        try {
          const res = await fetch(`${apiBase}/credentials`, { method: "GET", cache: "no-store" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const json = await res.json();

          initialCreds = {
            ssid: json.ssid || "",
            password: json.password || "",
            hostname: json.hostname || "",
            dhcp: (typeof json.dhcp === 'boolean') ? json.dhcp : true,
            ip: json.ip || "",
            gateway: json.gateway || "",
            subnet: json.subnet || "",
            dns1: json.dns1 || "",
            dns2: json.dns2 || "",
            channel: (json.channel ?? json.dmx_address ?? 1),
            universe: (json.universe ?? json.dmx_universe ?? 0),
            start_value: (json.start_value ?? 0)
          };

          document.getElementById("ssid").value = initialCreds.ssid || "";
          document.getElementById("password").value = initialCreds.password || "";
          document.getElementById("hostname").value = initialCreds.hostname || "";
          document.getElementById("ip_mode").value = initialCreds.dhcp ? "dhcp" : "static";
          document.getElementById("static_ip").value = initialCreds.ip || "";
          document.getElementById("gateway").value = initialCreds.gateway || "";
          document.getElementById("subnet").value = initialCreds.subnet || "";
          document.getElementById("dns1").value = initialCreds.dns1 || "";
          document.getElementById("dns2").value = initialCreds.dns2 || "";
          document.getElementById("channel").value = initialCreds.channel;
          document.getElementById("universe").value = initialCreds.universe;
          document.getElementById("start_value").value = initialCreds.start_value;
          toggleIpMode(document.getElementById("ip_mode").value);
          credentialsLoaded = true;
          setSaveEnabled(true);

          const sel = document.getElementById("network");
          if (!sel.disabled && initialCreds.ssid && optionExists(sel, initialCreds.ssid)) {
            sel.value = initialCreds.ssid;
            toggleCustomSsid(sel.value);
          } else {
            toggleCustomSsid(sel.value || "");
          }
        } catch (e) {
          toggleIpMode(document.getElementById("ip_mode").value);
          toggleCustomSsid("");
          credentialsLoaded = false;
          setSaveEnabled(false);
          setTimeout(() => alert("Failed to load current settings. Save is disabled to avoid overwriting them with blanks."), 0);
        }
      }

      function toggleIpMode(mode) {
        const wrap = document.getElementById("static-ip-fields");
        if (!wrap) return;
        wrap.style.display = mode === "static" ? "grid" : "none";
      }

      function renderNetworks(list) {
        const sel = document.getElementById("network");
        const refreshBtn = document.getElementById("refresh-networks");
        sel.disabled = false;
        sel.innerHTML = "";

        if (Array.isArray(list) && list.length) {
          for (const ssid of list) {
            const opt = document.createElement("option");
            opt.value = ssid;
            opt.text = ssid;
            sel.appendChild(opt);
          }
        }

        const other = document.createElement("option");
        other.value = "";
        other.text = "Other network";
        sel.appendChild(other);

        if (initialCreds && initialCreds.ssid && optionExists(sel, initialCreds.ssid)) {
          sel.value = initialCreds.ssid;
        }

        toggleCustomSsid(sel.value);
        if (refreshBtn) {
          refreshBtn.disabled = false;
          refreshBtn.textContent = "Refresh Networks";
        }
        networkScanInProgress = false;

        if (!networkHandlerAttached) {
          sel.addEventListener("change", () => toggleCustomSsid(sel.value));
          networkHandlerAttached = true;
        }
      }

      function initNetworkSelector() {
        const sel = document.getElementById("network");
        if (!sel) return;
        sel.disabled = false;
        sel.innerHTML = "";
        const other = document.createElement("option");
        other.value = "";
        other.text = "Other network";
        sel.appendChild(other);
        sel.value = "";
        if (!networkHandlerAttached) {
          sel.addEventListener("change", () => toggleCustomSsid(sel.value));
          networkHandlerAttached = true;
        }
      }

      async function fetchNetworks() {
        const sel = document.getElementById("network");
        const refreshBtn = document.getElementById("refresh-networks");
        try {
          const res = await fetch(`${apiBase}/networks?details=1&refresh=1`, { method: "GET", cache: "no-store" });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const body = await res.json();
          const list = Array.isArray(body.networks) ? body.networks : [];

          renderNetworks(list);
        } catch (e) {
          networkScanInProgress = false;
          sel.disabled = false;
          if (refreshBtn) {
            refreshBtn.disabled = false;
            refreshBtn.textContent = "Refresh Networks";
          }
          showManualSsid();
        }
      }

      function refreshNetworks() {
        if (networkScanInProgress) return;
        networkScanInProgress = true;
        const refreshBtn = document.getElementById("refresh-networks");
        if (refreshBtn) {
          refreshBtn.disabled = true;
          refreshBtn.textContent = "Scanning...";
        }
        fetchNetworks();
      }

      function showManualSsid() {
        document.getElementById("custom-ssid").style.display = "grid";
      }

      function toggleCustomSsid(selected) {
        const custom = document.getElementById("custom-ssid");
        const ssidInput = document.getElementById("ssid");
        const show = selected.length ? "none" : "grid";
        const value = selected.length ? selected : (initialCreds?.ssid || "");
        custom.style.display = show;
        ssidInput.value = value;
      }

      async function saveAndReboot() {
        const loaderWrap = document.getElementById("loader-wrap");
        if (loaderWrap) loaderWrap.style.display = "flex";

        try {
          if (!credentialsLoaded || !initialCreds) {
            if (loaderWrap) loaderWrap.style.display = "none";
            setTimeout(() => alert("Current settings have not finished loading yet."), 0);
            return;
          }

          const ipMode = document.getElementById("ip_mode").value;
          const dhcp = ipMode !== "static";
          const ip = document.getElementById("static_ip").value.trim();
          const gateway = document.getElementById("gateway").value.trim();
          const subnet = document.getElementById("subnet").value.trim();
          const dns1 = document.getElementById("dns1").value.trim();
          const dns2 = document.getElementById("dns2").value.trim();
          const selectedNetwork = getSelectedNetworkValue();
          const manualSsid = document.getElementById("ssid").value.trim();
          const ssid = (selectedNetwork || manualSsid || initialCreds.ssid || "").trim();
          const hostname = (document.getElementById("hostname").value.trim() || initialCreds.hostname || "").trim();

          if (!dhcp && (!ip || !gateway || !subnet)) {
            if (loaderWrap) loaderWrap.style.display = "none";
            setTimeout(() => alert("Static IPv4 requires IP, gateway and subnet."), 0);
            return;
          }

          if (!ssid) {
            if (loaderWrap) loaderWrap.style.display = "none";
            setTimeout(() => alert("SSID is required."), 0);
            return;
          }

          const payload = {
            ssid,
            password: document.getElementById("password").value,
            hostname,
            dhcp,
            ip,
            gateway,
            subnet,
            dns1,
            dns2,
            channel: Number(document.getElementById("channel").value || "1"),
            universe: Number(document.getElementById("universe").value || "0"),
            start_value: Number(document.getElementById("start_value").value || "0")
          };

          const res = await fetch(`${apiBase}/credentials`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (loaderWrap) loaderWrap.style.display = "none";
          if (res.status === 204) {
            document.getElementById("confirmation").style.display = "block";
          } else {
            restoreWithError();
          }
        } catch {
          restoreWithError();
        }
      }

      function restoreWithError() {
        const loaderWrap = document.getElementById("loader-wrap");
        if (loaderWrap) loaderWrap.style.display = "none";
        setTimeout(() => alert("Error saving configuration"), 0);
      }

      document.addEventListener("DOMContentLoaded", () => {
        setSaveEnabled(false);
        document.getElementById("save").addEventListener("click", saveAndReboot);
        document.getElementById("refresh-networks").addEventListener("click", refreshNetworks);
        document.getElementById("ip_mode").addEventListener("change", (e) => toggleIpMode(e.target.value));
        initNetworkSelector();
        toggleIpMode(document.getElementById("ip_mode").value);
        loadCredentials();
      });

</script>
</head>

        <div>
          <p class="eyebrow">Geneva Musical Theatre</p>
          <h1>Settings</h1>
          <p class="subtitle">Wi-Fi, hostname and Art-Net configuration</p>
        </div>
      </div>
      <div class="toolbar">
        <div class="theme-wrap">
          <span class="theme-label">Theme</span>
          <select class="theme-select" aria-label="Theme">
            <option value="gold">Gold</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
          </select>
        </div>
        <a class="btn" href="/">Dashboard</a>
        <a class="btn" href="/ota.html">Updates</a>
      </div>
    </header>

    <main class="panel">
      <section class="card">
        <div class="card-inner" id="manager">
          <section class="section">
            <div class="section-head">
              <h2 class="section-title">Wi-Fi</h2>
              <button id="refresh-networks" type="button" class="btn">Refresh Networks</button>
            </div>

            <div class="field-grid">
              <div class="field">
                <label for="network">Network</label>
                <select id="network">
                  <option>Other network</option>
                </select>
              </div>

              <div id="custom-ssid" class="field" style="display:none;">
                <label for="ssid">WLAN SSID</label>
                <input id="ssid" type="text" placeholder="Name of the network" />
              </div>

              <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="Only if required" />
              </div>

              <div class="field">
                <label for="hostname">Hostname</label>
                <input id="hostname" type="text" placeholder="eg. my-esp32" />
              </div>
            </div>
          </section>

          <section class="section">
            <div class="section-head">
              <h2 class="section-title">Art-Net Output</h2>
            </div>
            <div class="field-grid">
              <div class="field">
                <label for="channel">Channel</label>
                <input id="channel" type="number" min="1" max="512" step="1" inputmode="numeric" placeholder="1 - 512" />
              </div>
              <div class="field">
                <label for="universe">Universe</label>
                <input id="universe" type="number" min="0" max="32767" step="1" inputmode="numeric" placeholder="0" />
              </div>
              <div class="field">
                <label for="start_value">Start Value</label>
                <input id="start_value" type="number" step="any" inputmode="decimal" placeholder="0" />
              </div>
            </div>
          </section>

          <section class="section">
            <div class="section-head">
              <h2 class="section-title">IPv4</h2>
            </div>
            <div class="field-grid">
              <div class="field">
                <label for="ip_mode">Address Mode</label>
                <select id="ip_mode">
                  <option value="dhcp">DHCP</option>
                  <option value="static">Fixed IP</option>
                </select>
              </div>

              <div id="static-ip-fields" style="display:none; gap:12px;">
                <div class="field">
                  <label for="static_ip">IP Address</label>
                  <input id="static_ip" type="text" placeholder="192.168.1.50" />
                </div>
                <div class="field">
                  <label for="gateway">Gateway</label>
                  <input id="gateway" type="text" placeholder="192.168.1.1" />
                </div>
                <div class="field">
                  <label for="subnet">Subnet Mask</label>
                  <input id="subnet" type="text" placeholder="255.255.255.0" />
                </div>
                <div class="field">
                  <label for="dns1">DNS 1</label>
                  <input id="dns1" type="text" placeholder="8.8.8.8" />
                </div>
                <div class="field">
                  <label for="dns2">DNS 2</label>
                  <input id="dns2" type="text" placeholder="1.1.1.1" />
                </div>
              </div>
            </div>
          </section>

          <div class="inline-actions" style="margin-top:18px;">
            <button id="save" class="btn btn-primary" type="button">Save and Restart</button>
          </div>

          <div id="loader-wrap">
            <span id="loader"></span>
            <div>Saving configuration and restarting the controller…</div>
          </div>

          <div id="confirmation" class="notice">
            Credentials saved. The controller is restarting and will reconnect using the new settings.
          </div>
        </div>
      </section>
    </main>
  </div>
