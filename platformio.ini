; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32 @ 6.5.0
; board = esp32-c3-devkitm-1
framework = arduino
extra_scripts = pre:gzip_assets.py
monitor_speed = 115200
;upload_speed = 2000000
build_flags =
	-D CONFIG_ASYNC_TCP_RUNNING_CORE=0
	-D CONFIG_ASYNC_TCP_STACK_SIZE=8192
lib_deps =
	bblanchon/ArduinoJson@^6.21.3
	ESP32Async/AsyncTCP
	ESP32Async/ESPAsyncWebServer

; board_build.flash_mode = dio
; board_upload.flash_size = 4MB

; choose the FS
board_build.filesystem = littlefs

; enable custom partition table
board_build.partitions = partitions.csv
build_type = debug
monitor_filters = default, esp32_exception_decoder

[env:seeed_xiao_esp32s3]
board = seeed_xiao_esp32s3
build_flags =
	${env.build_flags}
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBLDC_UART_TX_PIN=43
	-DBLDC_UART_RX_PIN=44
	-DBLDC_UART_OE_PIN=-1
monitor_dtr = 0
monitor_rts = 0
build_src_filter =
	+<*>
	-<main_led.cpp>
	-<main_relay.cpp>

[env:seeed_xiao_esp32s3_led]
board = seeed_xiao_esp32s3
build_flags =
	${env.build_flags}
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
monitor_dtr = 0
monitor_rts = 0
build_src_filter =
	+<*>
	-<main_bldc.cpp>
	-<main_relay.cpp>

[env:seeed_xiao_esp32s3_relay]
board = seeed_xiao_esp32s3
build_flags =
	${env.build_flags}
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DRELAY_OUTPUT_PIN=9
monitor_dtr = 0
monitor_rts = 0
build_src_filter =
	+<*>
	-<main_bldc.cpp>
	-<main_led.cpp>

[env:nodemcu-32s]
board = nodemcu-32s
build_flags =
	${env.build_flags}
	-DBLDC_UART_OE_PIN=19
build_src_filter =
	+<*>
	-<main_led.cpp>
	-<main_relay.cpp>

[env:nodemcu-32s_led]
board = nodemcu-32s
build_flags =
	${env.build_flags}
	-DLED_PWM_PIN_1=16
	-DLED_PWM_PIN_2=17
	-DLED_PWM_PIN_3=21
	-DLED_PWM_PIN_4=2
build_src_filter =
	+<*>
	-<main_bldc.cpp>
	-<main_relay.cpp>

[env:nodemcu-32s_relay]
board = nodemcu-32s
build_flags =
	${env.build_flags}
	-DRELAY_OUTPUT_PIN=16
build_src_filter =
	+<*>
	-<main_bldc.cpp>
	-<main_led.cpp>
